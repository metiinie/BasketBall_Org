<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F8FAFC" />
    <meta name="description" content="Ethiopian Basketball Federation League Management System" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>EBF League Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Apply dark theme early if explicitly set
      if (localStorage.getItem('ebf-theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body class="transition-colors duration-300 antialiased font-sans">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

</html>
